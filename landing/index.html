<style>
  html, body { margin: 0; background: #DED2B9; }
  body { -webkit-font-smoothing: antialiased; }
  /* terminal caret blink */
  @keyframes rsh-blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
  .rsh-caret { animation: rsh-blink 1.05s steps(1) infinite; }
  /* soft pulse for "writing…" */
  @keyframes rsh-pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
  .rsh-pulse { animation: rsh-pulse 1.6s ease-in-out infinite; }
  /* fade-in for the surfaced brief card */
  @keyframes rsh-fadein {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rsh-fadein { animation: rsh-fadein 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(239,230,210,0.14); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  button:focus-visible { outline: 1px solid var(--accent-line); outline-offset: 2px; }
</style>
</head>
<body data-type="serif" data-accent="punctuation">
<div id="root"></div>

<script>
  // Fit the 1360px-wide live hero into the viewport on smaller screens.
  function fitHero() {
    const vw = document.documentElement.clientWidth;
    const target = 1360 + 48; // window width + breathing room
    const scale = Math.min(1, vw / target);
    document.documentElement.style.setProperty('--hero-fit', scale.toFixed(3));
  }
  window.addEventListener('resize', fitHero);
  fitHero();
</script>
